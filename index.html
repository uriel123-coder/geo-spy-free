<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFinder Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #007bff;
            --dark: #1a1a1a;
            --light: #f8f9fa;
            --border: #e0e0e0;
            --text: #2c3e50;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fff;
            color: var(--text);
            overflow: hidden;
        }

        /* Layout Principal */
        #app {
            display: flex;
            height: 100vh;
        }

        /* Panel Izquierdo - Upload */
        .upload-panel {
            width: 45%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-right: 1px solid var(--border);
            opacity: 1;
            transition: all 0.4s ease;
            z-index: 10;
        }

        .upload-panel.hidden {
            opacity: 0;
            width: 0;
            padding: 0;
            border: none;
            overflow: hidden;
        }

        .branding {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .branding h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .branding p {
            color: #666;
            font-size: 0.95rem;
        }

        /* Upload Area */
        .drop-zone {
            width: 100%;
            max-width: 400px;
            height: 300px;
            border: 2px dashed var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(7, 123, 255, 0.02);
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(7, 123, 255, 0.05);
            transform: scale(1.02);
        }

        .drop-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .drop-text {
            text-align: center;
            margin-bottom: 1rem;
        }

        .drop-text h3 {
            font-size: 1.1rem;
            margin-bottom: 0.3rem;
            color: var(--dark);
        }

        .drop-text p {
            font-size: 0.9rem;
            color: #999;
        }

        .btn-select {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-select:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(7, 123, 255, 0.3);
        }

        #fileInput {
            display: none;
        }

        /* Loading State */
        .loading-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .loading-state.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .loading-note {
            color: #999;
            font-size: 0.85rem;
        }

        /* Panel Derecho - Resultados */
        .results-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
        }

        .results-panel.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Map Container */
        #map {
            flex: 1;
            background: #e0e0e0;
            border: none;
        }

        .leaflet-container {
            font-family: inherit;
        }

        /* Info Panel Bottom */
        .info-panel {
            background: white;
            border-top: 1px solid var(--border);
            padding: 1.5rem 2rem;
            max-height: 280px;
            overflow-y: auto;
            display: none;
        }

        .info-panel.active {
            display: block;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .info-header h2 {
            font-size: 1.3rem;
            color: var(--dark);
        }

        .confidence-badge {
            background: var(--success);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .confidence-badge.low {
            background: #f59e0b;
        }

        .confidence-badge.very-low {
            background: var(--danger);
        }

        .coordinates {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
            padding: 1rem;
            background: var(--light);
            border-radius: 8px;
        }

        .coord-item {
            display: flex;
            flex-direction: column;
        }

        .coord-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .coord-value {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .analysis-section h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #999;
            font-weight: 600;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
        }

        .analysis-text {
            font-size: 0.9rem;
            line-height: 1.5;
            color: #555;
        }

        /* Top Bar Controls */
        .top-bar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            height: 0;
        }

        .top-bar.active {
            opacity: 1;
            pointer-events: auto;
            height: auto;
        }

        .bar-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--dark);
        }

        .bar-actions {
            display: flex;
            gap: 1rem;
        }

        .btn-action {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            color: var(--text);
        }

        .btn-action:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-action.secondary {
            background: white;
        }

        /* Status Messages */
        .status-message {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            background: var(--success);
            color: white;
            border-radius: 8px;
            font-size: 0.9rem;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .status-message.error {
            background: var(--danger);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .upload-panel {
                width: 50%;
            }

            .coordinates {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            #app {
                flex-direction: column;
            }

            .upload-panel {
                width: 100%;
                height: auto;
                min-height: 300px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .upload-panel.hidden {
                display: none;
            }

            .branding {
                margin-bottom: 1.5rem;
            }

            .branding h1 {
                font-size: 1.5rem;
            }

            .drop-zone {
                height: 250px;
            }

            .results-panel {
                min-height: 400px;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- Upload Panel -->
        <div class="upload-panel" id="uploadPanel">
            <div class="branding">
                <div class="logo-icon">🗺️</div>
                <h1>GeoFinder</h1>
                <p>Descubre dónde está cualquier foto</p>
            </div>

            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">📸</div>
                <div class="drop-text">
                    <h3>Sube una foto</h3>
                    <p>Arrastra o haz click para seleccionar</p>
                </div>
                <button class="btn-select">Elegir archivo</button>
            </div>

            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p class="loading-text">Analizando foto...</p>
                <p class="loading-note">Esto puede tardar 10-15 segundos</p>
            </div>

            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- Results Panel -->
        <div class="results-panel" id="resultsPanel">
            <div class="top-bar" id="topBar">
                <div class="bar-title">Ubicación detectada</div>
                <div class="bar-actions">
                    <button class="btn-action" onclick="downloadResult()">📥 Descargar</button>
                    <button class="btn-action secondary" onclick="resetApp()">🔄 Otra foto</button>
                </div>
            </div>

            <div id="map"></div>

            <div class="info-panel" id="infoPanel">
                <div class="info-header">
                    <h2 id="locationName">Cargando...</h2>
                    <div class="confidence-badge" id="confidenceBadge">--</div>
                </div>

                <div class="coordinates">
                    <div class="coord-item">
                        <div class="coord-label">Latitud</div>
                        <div class="coord-value" id="latValue">--</div>
                    </div>
                    <div class="coord-item">
                        <div class="coord-label">Longitud</div>
                        <div class="coord-value" id="lonValue">--</div>
                    </div>
                </div>

                <div class="analysis-section">
                    <h3>Análisis Inteligente</h3>
                    <p class="analysis-text" id="analysisText">Procesando...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let currentMarker;

        // DOM Elements
        const uploadPanel = document.getElementById('uploadPanel');
        const resultsPanel = document.getElementById('resultsPanel');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const loadingState = document.getElementById('loadingState');
        const topBar = document.getElementById('topBar');
        const infoPanel = document.getElementById('infoPanel');

        // Initialize map
        function initMap() {
            if (map) return;
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);
        }

        // Drag & Drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) handleFile(files[0]);
        });

        // File Selection
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        // Handle File Upload
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                showStatus('Por favor selecciona una imagen válida', true);
                return;
            }

            // Show loading
            dropZone.style.display = 'none';
            loadingState.classList.add('active');

            // Prepare form data
            const formData = new FormData();
            formData.append('image', file);

            // Send to backend
            fetch('/analyze', {
                method: 'POST',
                body: formData
            })
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'success') {
                        showResults(data);
                    } else {
                        showStatus('Error: ' + data.message, true);
                        resetApp();
                    }
                })
                .catch(err => {
                    showStatus('Error de conexión', true);
                    console.error(err);
                    resetApp();
                });
        }

        // Display Results
        function showResults(data) {
            // Hide upload, show results
            uploadPanel.classList.add('hidden');
            resultsPanel.classList.add('active');
            topBar.classList.add('active');
            infoPanel.classList.add('active');

            initMap();

            // Center map on result
            const lat = parseFloat(data.lat);
            const lon = parseFloat(data.lon);
            map.setView([lat, lon], 14);

            // Remove old marker
            if (currentMarker) map.removeLayer(currentMarker);

            // Add new marker with custom icon
            const marker = L.marker([lat, lon], {
                icon: L.icon({
                    iconUrl: 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iNDgiIHZpZXdCb3g9IjAgMCAzMiA0OCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIxNiIgY3k9IjE2IiByPSIxNiIgZmlsbD0iIzAwN2JmZiIvPjxjaXJjbGUgY3g9IjE2IiBjeT0iMTYiIHI9IjgiIGZpbGw9IndoaXRlIi8+PHBhdGggZD0iTTE2IDMyQzI0LjgyODQgMzIgMzIgMzguNjI3NCAzMiA0OEgwQzAgMzguNjI3NCA3LjE3MTYgMzIgMTYgMzJaIiBmaWxsPSIjMDA3YmZmIi8+PC9zdmc+',
                    iconSize: [32, 48],
                    iconAnchor: [16, 48],
                    popupAnchor: [0, -48]
                })
            })
                .addTo(map)
                .bindPopup(`<b>${data.location}</b>`, { closeButton: false })
                .openPopup();

            currentMarker = marker;

            // Update info panel
            document.getElementById('locationName').textContent = data.location_es || data.location;
            document.getElementById('latValue').textContent = lat.toFixed(6);
            document.getElementById('lonValue').textContent = lon.toFixed(6);

            const confidence = parseFloat(data.confidence);
            const badge = document.getElementById('confidenceBadge');
            badge.textContent = data.confidence;
            badge.className = 'confidence-badge';
            if (confidence >= 80) badge.classList.remove('low', 'very-low');
            else if (confidence >= 50) badge.classList.add('low');
            else badge.classList.add('very-low');

            document.getElementById('analysisText').textContent = data.reasoning || 'Análisis de IA completado correctamente';

            loadingState.classList.remove('active');
            showStatus('✓ Ubicación detectada correctamente');
        }

        // Reset App
        function resetApp() {
            uploadPanel.classList.remove('hidden');
            resultsPanel.classList.remove('active');
            topBar.classList.remove('active');
            infoPanel.classList.remove('active');
            dropZone.style.display = 'flex';
            loadingState.classList.remove('active');
            fileInput.value = '';
            dropZone.classList.remove('drag-over');
        }

        // Download Result
        function downloadResult() {
            const lat = document.getElementById('latValue').textContent;
            const lon = document.getElementById('lonValue').textContent;
            const location = document.getElementById('locationName').textContent;

            const text = `📍 RESULTADO GEOFINDER\n\nUbicación: ${location}\nLatitud: ${lat}\nLongitud: ${lon}\n\nMaps: https://maps.google.com/?q=${lat},${lon}`;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'geofinder-resultado.txt';
            a.click();
        }

        // Status Messages
        function showStatus(msg, isError = false) {
            const status = document.createElement('div');
            status.className = 'status-message' + (isError ? ' error' : '');
            status.textContent = msg;
            document.body.appendChild(status);
            setTimeout(() => status.remove(), 3000);
        }

        // Show initial message  
        window.addEventListener('load', () => {
            showStatus('🌍 Bienvenido a GeoFinder Pro');
        });
    </script>
</body>

</html>
